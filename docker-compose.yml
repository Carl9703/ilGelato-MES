services:
  backend:
    build:
      context: .
      target: backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: file:/data/gelato.db
    volumes:
      - /volume1/docker/ilgelato/data:/data
    networks:
      - internal

  frontend:
    build:
      context: .
      target: frontend
    restart: always
    ports:
      # UGOS Pro uses port 9999 for its web UI — port 8080 is free.
      # Change if another service already occupies 8080.
      - "8080:80"
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge
